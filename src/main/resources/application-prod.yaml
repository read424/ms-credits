spring:
  application:
    name: ms-credits

  cloud:
    config:
      enabled: true

  # MongoDB Configuration (from Cloud Config Server)
  data:
    mongodb:
      auto-index-creation: true

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka_broker:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ms-credits-group
      auto-offset-reset: earliest

  # Redis Configuration
  redis:
    host: ${SPRING_REDIS_HOST}
    port: ${SPRING_REDIS_PORT}
    password: ${SPRING_REDIS_PASSWORD}
    timeout: 2000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  # WebFlux Configuration
  webflux:
    base-path: /

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: 8083

eureka:
  client:
    enabled: true
  instance:
    preferIpAddress: true
    ipAddress: ms-credits
    hostName: ms-credits

# Actuator Configuration
management:
  endpoints:
    web:
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2000
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 1000
        permittedNumberOfCallsInHalfOpenState: 5
        eventConsumerBufferSize: 10
        ignoreExceptions: []
        recordExceptions:
          - java.io.IOException
          - java.net.ConnectException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientException
    instances:
      creditService:
        registerHealthIndicator: true
        baseConfig: default
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2000
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10000
        minimumNumberOfCalls: 10
        eventConsumerBufferSize: 10

      externalApi:
        base-config: default
        sliding-window-size: 100
        failure-rate-threshold: 40
        wait-duration-in-open-state: 2000ms

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - java.io.IOException
          - java.net.ConnectException

    instances:
      creditService:
        base-config: default
        max-attempts: 5
        wait-duration: 1000ms

      externalApi:
        base-config: default
        max-attempts: 3
        wait-duration: 500ms

  ratelimiter:
    configs:
      default:
        register-health-indicator: false
        limit-refresh-period: 1m
        limit-for-period: 100
        timeout-duration: 5s

    instances:
      creditService:
        base-config: default
        limit-for-period: 50
        limit-refresh-period: 1m

      externalApi:
        base-config: default
        limit-for-period: 30
        limit-refresh-period: 1m

  timelimiter:
    configs:
      default:
        cancel-running-future: true
        timeout-duration: 2s

    instances:
      creditService:
        timeout-duration: 3s

      externalApi:
        timeout-duration: 5s

# Kafka Topics Configuration
kafka:
  topics:
    credit-created: credit.created
    credit-payment-completed: credit.payment.completed
    credit-charge-completed: credit.charge.completed

# Logging Configuration
logging:
  level:
    root: INFO
    com.bootcamp.ms_credits: DEBUG
    org.springframework.web: INFO
    org.springframework.data: DEBUG
    org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger: WARN
    com.netflix.discovery.shared.resolver.aws.ConfigClusterResolver: WARN
    org.springframework.data.convert.CustomConversions: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ms-credits.log
    max-size: 10MB
    max-history: 10
