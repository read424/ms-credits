version: '3.9'

services:
  # MongoDB - Base de datos principal
  mongodb:
    image: mongo:8.3.4
    container_name: mongodb-credits
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: bootcamp_credits_prod_2024
      MONGO_INITDB_DATABASE: ms_credits_prod
    volumes:
      - ./init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
      - mongodb_credits_data:/data/db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bootcamp-network
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh -u admin -p bootcamp_credits_prod_2024 localhost:27017/admin
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache y sesiones
  redis:
    image: redis:7.2.4-alpine
    container_name: redis-credits
    restart: unless-stopped
    ports:
      - "6381:6379"
    command: redis-server --requirepass eYVX7EwVmmxKPCDmwMtyKVge8oLd2t81
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bootcamp-network
    healthcheck:
      test: redis-cli -a eYVX7EwVmmxKPCDmwMtyKVge8oLd2t81 ping
      interval: 10s
      timeout: 5s
      retries: 5
  # ms-credits Microservice
  ms-credits:
    build:
      context: .
      dockerfile: Dockerfile
    image: read424/ms-credits:latest
    container_name: ms-credits
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: configserver:http://service-config-server:8888
      SPRING_REDIS_HOST: redis-credits
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: eYVX7EwVmmxKPCDmwMtyKVge8oLd2t81
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka_broker:9092
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://service-eureka:8761/eureka/
      JAVA_OPTS: -Xmx512m -Xms256m
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bootcamp-network

volumes:
  mongodb_credits_data:

networks:
  bootcamp-network:
    name: bootcamp-network
    external: true
